spring.application.name=sims

# ?? MongoDB ???????????????????????????????????????????????????????????
# Assure-toi que MongoDB est installé et lancé localement
# Les collections sont créées automatiquement, rien à faire
spring.data.mongodb.uri=mongodb://localhost:27017/hikma_stagiaires
spring.data.mongodb.auto-index-creation=true

# ?? Cache ?????????????????????????????????????????????????????????????
# SIMPLE = cache en mémoire (pas besoin de Redis pour tester)
# Quand Redis sera prêt, remplace par : spring.cache.type=redis
spring.cache.type=simple

# ?? Multipart (upload CV, photos) ????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ?? JWT ???????????????????????????????????????????????????????????????
app.jwt.secret=hikma-super-secret-key-change-in-production-must-be-256-bits-long
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ?? Stockage fichiers ?????????????????????????????????????????????????
app.upload-dir=uploads
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:5173

# ?? Swagger UI ????????????????????????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# ?? Logging ???????????????????????????????????????????????????????????
logging.level.com.hikma.stagiaires=DEBUG
logging.level.org.springframework.security=WARN